<!DOCTYPE html>
<html>
<head>
    <title>Touch Grass!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Touch Grass</h1>
    <button id="locate-me">Start Tracking</button>
    
    <div id="status">Status: Waiting for user...</div>
    <div id="coords">Coordinates: --</div>

    <div id="compass-container">
        <div class="needle"></div>
        <div id="compass-disk">
            <span class="label n">N</span>
            <span class="label e">E</span>
            <span class="label s">S</span>
            <span class="label w">W</span>
        </div>
    </div>
    <p id="heading-display">Heading: 0°</p>
    <p id="nearest-distance">Distance: --</p>
    <p id="nearest-name">Name: --</p>
     <script src="helpers.js"></script>
     <script src="data.js"></script>
     <script src="brain.js"></script>
     <script src="app.js"></script>
</body>
</html>
